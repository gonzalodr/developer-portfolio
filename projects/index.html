<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Detalle de proyecto – Portafolio de Gonzalo Dormos Rodríguez" />
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- El <title> se actualiza dinámicamente en project.js -->
  <title>Gonzalo Dormos | Proyecto</title>
</head>
<body class="bg-gray-100 font-sans antialiased">

  <div class="flex flex-col items-center gap-12 p-6 sm:p-10">

    <!-- BOTÓN VOLVER -->
    <div class="w-full max-w-6xl">
      <a href="../index.html"
         class="inline-flex items-center gap-2 text-sm font-semibold text-gray-500 hover:text-blue-600 transition">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none"
             viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
        </svg>
        Volver al portafolio
      </a>
    </div>

    <!-- HEADER / BANNER (imagen de portada + título) -->
    <header id="project-header"
      class="w-full max-w-6xl bg-white shadow-xl overflow-hidden">
    </header>

    <!-- DESCRIPCIÓN -->
    <section id="project-description"
      class="w-full max-w-6xl bg-white p-10 shadow-xl">
    </section>

    <!-- CARACTERÍSTICAS PRINCIPALES -->
    <section id="project-features"
      class="w-full max-w-6xl bg-white p-10 shadow-xl">
    </section>

    <!-- STACK TECNOLÓGICO -->
    <section id="project-techs"
      class="w-full max-w-6xl bg-white p-10 shadow-xl">
    </section>

    <!-- DESAFÍO Y SOLUCIÓN -->
    <section id="project-challenge"
      class="w-full max-w-6xl bg-white p-10 shadow-xl">
    </section>

    <!-- ENLACES (GitHub / Demo) -->
    <section id="project-links"
      class="w-full max-w-6xl">
    </section>

  </div>

  <!-- Datos centralizados + lógica de la plantilla de proyecto -->
  <script src="../js/data.js"></script>
  <script src="../js/project.js"></script>

</body>
</html>
