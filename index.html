<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Portafolio de Gonzalo Dormos Rodríguez - Backend Developer especializado en Node.js, FastAPI, React y PostgreSQL." />
  <script src="https://cdn.tailwindcss.com"></script>
  <title>Gonzalo Dormos Rodríguez | Portafolio</title>
</head>
<body class="bg-gray-100 font-sans antialiased">

  <div class="flex flex-col items-center gap-16 p-6 sm:p-10">

    <!-- HERO -->
    <header id="hero"
      class="flex w-full max-w-6xl flex-col items-center gap-8 bg-white p-10 shadow-xl sm:flex-row">
    </header>

    <!-- STATS -->
    <section id="stats"
      class="grid w-full max-w-6xl grid-cols-2 gap-6 sm:grid-cols-4">
    </section>

    <!-- ABOUT -->
    <section id="about"
      class="w-full max-w-6xl bg-white p-10 shadow-xl">
    </section>

    <!-- STACK -->
    <section id="stack"
      class="w-full max-w-6xl">
    </section>

    <!-- PROYECTOS -->
    <section id="projects"
      class="w-full max-w-6xl">
    </section>

    <!-- CTA -->
    <section id="cta"
      class="w-full max-w-6xl text-center bg-gradient-to-r from-indigo-600 to-blue-700 text-white p-12 shadow-xl">
    </section>

    <!-- FOOTER -->
    <footer id="footer"
      class="w-full max-w-6xl bg-gray-900 text-white p-10 flex flex-col sm:flex-row justify-between gap-6">
    </footer>

  </div>
  <script src="js/data.js"></script>
  <script src="js/main.js"></script>

</body>
</html>
